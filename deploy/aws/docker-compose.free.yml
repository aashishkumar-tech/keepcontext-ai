services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: keepcontext-chromadb
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: keepcontext-ai
    env_file:
      - .env.ec2
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j.invalid:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-change-me}
    ports:
      - "8003:8000"
    depends_on:
      chromadb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:
