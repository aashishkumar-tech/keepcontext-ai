services:
  # --- ChromaDB vector database ---
  chromadb:
    image: chromadb/chroma:latest
    container_name: keepcontext-chromadb
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Neo4j knowledge graph ---
  neo4j:
    image: neo4j:5-community
    container_name: keepcontext-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=${NEO4J_USER:?Missing NEO4J_USER}/${NEO4J_PASSWORD:?Missing NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # --- KeepContext AI application ---
  app:
    build: .
    container_name: keepcontext-ai
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:?Missing NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?Missing NEO4J_PASSWORD}
    ports:
      - "8003:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      chromadb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:
  neo4j_data:
